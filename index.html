<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Student Scanner</title>
    <meta name="description" content="AI-powered student face recognition scanner for classroom attendance." />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Full-screen camera layer -->
    <div id="scanner-root">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>

      <!-- AR HUD overlays -->
      <div class="hud-corner top-left"></div>
      <div class="hud-corner top-right"></div>
      <div class="hud-corner bottom-left"></div>
      <div class="hud-corner bottom-right"></div>

      <!-- Top Bar -->
      <div class="top-bar">
        <div class="app-title">
          <span class="title-tag">SYS://</span>
          <span class="title-main">AI SCANNER</span>
        </div>
        <div class="scan-status" id="scan-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">SCANNING...</span>
        </div>
      </div>

      <!-- Loading Overlay -->
      <div id="loading-overlay" class="loading-overlay">
        <div class="loading-inner">
          <div class="load-bars">
            <span></span><span></span><span></span>
          </div>
          <p id="loading-text">LOADING AI MODELS</p>
          <div class="load-track">
            <div class="load-fill"></div>
          </div>
        </div>
      </div>

      <!-- AR Target Reticle -->
      <div class="reticle" id="reticle">
        <div class="reticle-ring"></div>
        <div class="reticle-cross">+</div>
      </div>

      <!-- Floating popups & modals are injected here by JS -->
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
